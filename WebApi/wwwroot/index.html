<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WPF Server Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #242222 0%, #343131 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: #343131;
            border-radius: 24px;
            padding: 40px 30px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(216, 162, 94, 0.1);
            animation: fadeIn 0.4s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

            .header h1 {
                color: #D8A25E;
                font-size: 28px;
                font-weight: 600;
                margin-bottom: 8px;
                letter-spacing: -0.5px;
            }

            .header p {
                color: rgba(216, 162, 94, 0.6);
                font-size: 14px;
            }

        .input-group {
            margin-bottom: 24px;
        }

            .input-group label {
                display: block;
                color: #D8A25E;
                font-size: 14px;
                font-weight: 500;
                margin-bottom: 10px;
                letter-spacing: 0.3px;
            }

        .input-wrapper {
            position: relative;
        }

            .input-wrapper input {
                width: 100%;
                padding: 16px 20px;
                background: #242222;
                border: 2px solid transparent;
                border-radius: 12px;
                color: #D8A25E;
                font-size: 16px;
                transition: all 0.3s ease;
                outline: none;
            }

                .input-wrapper input:focus {
                    border-color: #D8A25E;
                    box-shadow: 0 0 0 4px rgba(216, 162, 94, 0.1);
                }

                .input-wrapper input::placeholder {
                    color: rgba(216, 162, 94, 0.3);
                }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #D8A25E 0%, #c4914d 100%);
            color: #242222;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(216, 162, 94, 0.3);
            letter-spacing: 0.5px;
        }

            .btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 20px rgba(216, 162, 94, 0.4);
            }

            .btn:active {
                transform: translateY(0);
            }

            .btn:disabled {
                opacity: 0.6;
                cursor: not-allowed;
                transform: none;
            }

        .response {
            margin-top: 24px;
            padding: 20px;
            background: #242222;
            border-radius: 12px;
            border-left: 4px solid #D8A25E;
            display: none;
            animation: slideIn 0.3s ease;
        }

            .response.show {
                display: block;
            }

            .response.error {
                border-left-color: #A04747;
            }

        .response-title {
            color: #D8A25E;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .response.error .response-title {
            color: #A04747;
        }

        .response-message {
            color: rgba(216, 162, 94, 0.9);
            font-size: 14px;
            line-height: 1.6;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            word-wrap: break-word;
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 8px;
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(36, 34, 34, 0.3);
            border-top-color: #242222;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

            .loader.show {
                display: block;
            }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 32px 24px;
                border-radius: 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .input-wrapper input {
                padding: 14px 16px;
                font-size: 15px;
            }

            .btn {
                padding: 14px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>WPF Server Test</h1>
            <p>Send name to server</p>
        </div>

        <div class="input-group">
            <label for="nameInput">Your Name</label>
            <div class="input-wrapper">
                <input id="nameInput"
                       type="text"
                       placeholder="Enter name..."
                       onkeypress="if(event.key === 'Enter') send()" />
            </div>
        </div>

        <button onclick="send()" class="btn" id="sendBtn">
            <span id="btnText">Send</span>
            <div class="loader" id="loader"></div>
        </button>

        <div class="response" id="response">
            <div class="response-title" id="responseTitle">Server Response</div>
            <div class="response-message" id="responseBox"></div>
        </div>
    </div>

    <script>
        function getDeviceId() {
            let id = localStorage.getItem('deviceId');
            if (!id) {
                
                id = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
                    const r = Math.random() * 16 | 0;
                    const v = c === 'x' ? r : (r & 0x3 | 0x8);
                    return v.toString(16);
                });
                localStorage.setItem('deviceId', id);
            }
            return id;
        }

        async function send() {
            const name = document.getElementById("nameInput").value;
            const sendBtn = document.getElementById("sendBtn");
            const btnText = document.getElementById("btnText");
            const loader = document.getElementById("loader");
            const response = document.getElementById("response");
            const responseTitle = document.getElementById("responseTitle");
            const responseBox = document.getElementById("responseBox");

            if (!name.trim()) {
                response.classList.add('show', 'error');
                response.classList.remove('success');
                responseTitle.textContent = 'Error';
                responseBox.textContent = 'Please enter a name';
                return;
            }

            sendBtn.disabled = true;
            btnText.style.display = 'none';
            loader.classList.add('show');
            response.classList.remove('show');

            try {
                const fetchResponse = await fetch("http://192.168.100.4:5152/api/check-subscription", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        name: name,
                        deviceId: getDeviceId()
                    })
                });

                const text = await fetchResponse.text();

                sendBtn.disabled = false;
                btnText.style.display = 'block';
                loader.classList.remove('show');

                response.classList.add('show');
                response.classList.remove('error');
                responseTitle.textContent = 'Server Response';
                responseBox.textContent = text;

            } catch (error) {
                sendBtn.disabled = false;
                btnText.style.display = 'block';
                loader.classList.remove('show');

                response.classList.add('show', 'error');
                responseTitle.textContent = 'Error';
                responseBox.textContent = "Error: " + error.message;
            }
        }

        document.getElementById("nameInput").addEventListener('input', () => {
            const response = document.getElementById("response");
            if (response.classList.contains('show')) {
                response.classList.remove('show');
            }
        });
    </script>
</body>
</html>
